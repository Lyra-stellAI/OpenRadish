<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community — Openhub</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div id="navbar-root"></div>

  <main class="container">
    <div id="sidebar-left-root"></div>

    <section class="feed" id="feed">
      <div id="community-banner-root"></div>

      <div class="sort-bar">
        <button class="sort-btn active" data-sort="hot"><i class="fas fa-fire"></i> Hot</button>
        <button class="sort-btn" data-sort="new"><i class="fas fa-bolt"></i> New</button>
        <button class="sort-btn" data-sort="top"><i class="fas fa-chart-line"></i> Top</button>
      </div>

      <div id="posts-container"></div>
    </section>

    <aside class="sidebar sidebar-right" id="sidebar-right-root"></aside>
  </main>

  <div id="auth-modal-root"></div>

  <!-- Core -->
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/posts.js"></script>
  <!-- Shared components -->
  <script src="js/components/navbar.js"></script>
  <script src="js/components/sidebar-left.js"></script>
  <script src="js/components/auth-modal.js"></script>
  <!-- Page components -->
  <script src="js/components/community-banner.js"></script>
  <script src="js/components/community-cards.js"></script>
  <!-- Init -->
  <script src="js/app.js"></script>
</body>
</html>

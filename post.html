<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — Openhub</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div id="navbar-root"></div>

  <main class="container container-post">
    <section class="feed" id="feed">
      <div class="post-detail" id="post-detail"></div>

      <div class="comments-section" id="comments-section">
        <h3 id="comment-count">Comments</h3>
        <div class="comment-form">
          <textarea class="input textarea" id="comment-input" placeholder="Share your thoughts..."></textarea>
          <button class="btn btn-primary" id="comment-submit">Comment</button>
        </div>
        <div class="comment-sort">
          <span>Sort by:</span>
          <select id="comment-sort-select" class="input input-sm">
            <option value="best">Best</option>
            <option value="new">New</option>
            <option value="top">Top</option>
          </select>
        </div>
        <div id="comments-container"></div>
      </div>
    </section>

    <aside class="sidebar sidebar-right" id="sidebar-right-root"></aside>
  </main>

  <div id="auth-modal-root"></div>

  <!-- Core -->
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/posts.js"></script>
  <!-- Shared components -->
  <script src="js/components/navbar.js"></script>
  <script src="js/components/auth-modal.js"></script>
  <!-- Page components -->
  <script src="js/components/post-sidebar.js"></script>
  <script src="js/post-detail.js"></script>
  <!-- Init -->
  <script src="js/app.js"></script>
</body>
</html>
